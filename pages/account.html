<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | ElectroPremium</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    
    <style>
        .auth-container {
            display: flex;
            min-height: calc(100vh - 64px);
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #F5F5F7;
        }
        
        .auth-box {
            background: white;
            padding: 64px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        
        .auth-box h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 32px;
            justify-content: center;
            margin-bottom: 40px;
            margin-top: 24px;
        }
        
        .auth-tab {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }
        
        .auth-tab.active {
            color: var(--text-primary);
            border-color: var(--accent-color);
        }
        
        .social-auth {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            justify-content: center;
        }
        
        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .social-btn:hover {
            background: var(--bg-light);
        }
    </style>
</head>
<body>

    <!-- Header (Minimal) -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fab fa-apple"></i> ElectroPremium
            </a>
            <a href="index.html" style="font-size: 14px;">Exit</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <h1>Welcome.</h1>
            <p class="text-secondary">Sign in to ElectroPremium or create an account.</p>
            
            <div class="auth-tabs">
                <div class="auth-tab active">Sign In</div>
                <div class="auth-tab">Create Account</div>
            </div>
            
            <form action="user-dashboard.html">
                <div class="form-group" style="text-align: left;">
                    <label>Apple ID or Email</label>
                    <input type="email" placeholder="email@icloud.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <div style="text-align: right; margin-bottom: 24px;">
                    <a href="#" style="font-size: 13px; color: var(--accent-color);">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">Sign In</button>
            </form>
            
            <div style="margin-top: 40px;">
                <p class="text-secondary" style="font-size: 13px;">Or continue with</p>
                <div class="social-auth">
                    <div class="social-btn"><i class="fab fa-google"></i></div>
                    <div class="social-btn"><i class="fab fa-facebook-f"></i></div>
                    <div class="social-btn"><i class="fab fa-github"></i></div>
                </div>
            </div>
            
            <p class="text-secondary" style="font-size: 12px; margin-top: 48px; line-height: 1.6;">
                Your Apple ID is the account you use to access all ElectroPremium services.
            </p>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>
</html>
