<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-grad-1: #8E2DE2;
            --bg-grad-2: #4A00E0;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #fff;
            --input-bg: rgba(255, 255, 255, 0.1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #1a1a2e;
            --bg-grad-2: #16213e;
            --glass-bg: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-color: #e6e6e6;
            --input-bg: rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            transition: background 0.5s ease;
        }
        
        /* Fluid Abstract Shapes */
        .shape { position: absolute; filter: blur(60px); opacity: 0.8; z-index: -1; animation: float 10s infinite alternate ease-in-out; }
        .shape1 { width: 400px; height: 400px; background: rgba(234, 141, 141, 0.6); top: -100px; left: -100px; border-radius: 50%; }
        .shape2 { width: 500px; height: 500px; background: rgba(74, 144, 226, 0.5); bottom: -150px; right: -100px; border-radius: 50%; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 40px); } }

        /* Glassmorphism Login Card */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            transform: translateY(20px);
            animation: fadeUp 0.8s forwards ease-out;
            margin: 20px;
        }
        @keyframes fadeUp { to { transform: translateY(0); opacity: 1; } from { opacity: 0; } }

        /* Typography & Header */
        .header { text-align: center; margin-bottom: 32px; }
        .header i { font-size: 32px; color: #fff; margin-bottom: 16px; }
        .header h1 { font-size: 28px; font-weight: 600; letter-spacing: 0.5px; }
        .header p { font-size: 14px; opacity: 0.8; margin-top: 4px; }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group input {
            width: 100%; padding: 14px 14px 14px 48px;
            background: var(--input-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; color: var(--text-color); font-size: 15px; outline: none;
            transition: all 0.3s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.7); }
        .form-group input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .form-group i.icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.8; font-size: 18px; }
        .toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.8; font-size: 18px; }

        /* Options */
        .options { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 28px; }
        .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .options input[type="checkbox"] { accent-color: #8E2DE2; cursor: pointer; width: 16px; height: 16px; }
        .options a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .options a:hover { opacity: 0.7; }

        /* Buttons */
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border: none; border-radius: 50px; color: #111;
            font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.4); transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(250, 112, 154, 0.5); }

        .secondary-cta { text-align: center; margin-top: 32px; font-size: 14px; }
        .secondary-cta a { color: #fff; font-weight: 600; text-decoration: underline; margin-left: 6px; }

        /* Utilities */
        .theme-toggle { position: absolute; top: 24px; right: 24px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: transform 0.2s; }
        .theme-toggle:hover { transform: scale(1.1); }
        
        .rtl-toggle { position: absolute; top: 24px; right: 80px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: transform 0.2s; }
        .rtl-toggle:hover { transform: scale(1.1); }
        
        .back-nav { position: absolute; top: 24px; left: 24px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); padding: 10px 20px; border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 14px; transition: transform 0.2s; font-weight: 500; }
        .back-nav:hover { transform: scale(1.05); }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .header h1 { font-size: 24px; }
            .theme-toggle { top: 16px; right: 16px; }
            .rtl-toggle { top: 16px; right: 68px; }
            .back-nav { top: 16px; left: 16px; padding: 8px 16px; }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>
    <a href="index.html" class="back-nav"><i class="fas fa-arrow-left"></i> Home</a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
    <button class="rtl-toggle" onclick="toggleRTL()" aria-label="Toggle right to left"><i class="fas fa-globe"></i></button>

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="login-card">
        <div class="header">
            <i class="fas fa-heart"></i>
            <h1>Welcome Back!</h1>
            <p>Please enter your details to sign in</p>
        </div>

        <form action="user-dashboard.html">
            <div class="form-group">
                <i class="fas fa-user icon"></i>
                <input type="text" placeholder="Email or Username" required aria-label="Email or Username">
            </div>
            <div class="form-group">
                <i class="fas fa-lock icon"></i>
                <input type="password" id="password" placeholder="Password" required aria-label="Password">
                <i class="fas fa-eye toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility"></i>
            </div>
            
            <div class="options">
                <label>
                    <input type="checkbox" aria-label="Remember me"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign in</button>
        </form>

        <div class="secondary-cta">
            <span style="opacity: 0.8;">Don't have an account?</span><a href="#">Register here</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        function toggleTheme() {
            document.body.toggleAttribute('data-theme', 'dark');
            const icon = document.querySelector('.theme-toggle i');
            if (document.body.hasAttribute('data-theme')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        function toggleRTL() {
            const currentlyRTL = document.documentElement.getAttribute('dir') === 'rtl';
            if (currentlyRTL) {
                document.documentElement.removeAttribute('dir');
                localStorage.setItem('rtl_layout', 'false');
            } else {
                document.documentElement.setAttribute('dir', 'rtl');
                localStorage.setItem('rtl_layout', 'true');
            }
        }

        // Initialize RTL on load for login page
        if(localStorage.getItem('rtl_layout') === 'true') {
            document.documentElement.setAttribute('dir', 'rtl');
        }
    </script>
</body>
</html>
