<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | ElectroPremium</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        
        .error-content h1 {
            font-size: 120px;
            margin-bottom: 24px;
            letter-spacing: -5px;
        }
        
        .error-content p {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }
    </style>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>

    <main class="error-container">
        <div class="error-content">
            <h1 class="animate-up">404</h1>
            <h2 style="font-size: 32px; margin-bottom: 16px;">The page you're looking for can't be found.</h2>
            <p>It looks like the link is broken or the page has been moved.</p>
            <div style="display: flex; gap: 16px; justify-content: center;">
                <a href="index.html" class="btn btn-primary">Go Home</a>
                <a href="shop.html" class="btn btn-outline">Browse Shop</a>
            </div>
        </div>
    </main>

</body>
</html>
